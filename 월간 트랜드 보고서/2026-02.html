<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>경쟁작 캐릭터 트렌드 월간 보고서 — 2026.02</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --bg: #FBF6EA; --section: #F3EAD3; --card: #FFFBF1; --card-2: #F6EDD7;
  --line: #E2D6BA; --line-soft: #EDE3CA; --line-strong: #C4B594;
  --fg: #2B241A; --fg-h: #1A140D; --fg-2: #5B503F; --fg-3: #8C7F66; --fg-4: #B0A386;
  --info: #4A6FA5; --emph: #A0557B; --pos: #5E8A4A; --neg: #B54545; --warn: #C08A28;
  --pk-f: #D88AA8; --pk-m: #6F93B8; --pk-r: #A89B82; --pk-x: #9A7BA8; --pk-u: #BEB39A;
  --role-SS: #C25C8A; --role-S: #8B6BA8; --role-A: #4A6FA5; --role-T2: #B58A3A;
  --h1: 32px; --h2: 24px; --h3: 18px; --body: 15px; --small: 13.5px; --caption: 12.5px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: var(--bg); color: var(--fg);
  font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: var(--body); line-height: 1.55; -webkit-font-smoothing: antialiased;
  font-feature-settings: "tnum" 1, "cv11" 1;
}
.mono { font-family: "Pretendard", "Noto Sans KR", sans-serif; font-variant-numeric: tabular-nums; }
.inter { font-family: "Inter", sans-serif; font-variant-numeric: tabular-nums; }
.page { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }
.rpt-header {
  display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  padding-bottom: 20px; border-bottom: 1px solid var(--line-strong); margin-bottom: 28px;
}
.rpt-header .eyebrow { font-size: 12.5px; letter-spacing: 0.12em; color: var(--fg-3); text-transform: uppercase; margin-bottom: 10px; }
.rpt-header .back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--fg-3); text-decoration: none;
  padding: 4px 10px 4px 8px; border: 1px solid var(--line);
  border-radius: 4px; background: var(--card);
  margin-bottom: 14px; transition: all 0.15s;
  letter-spacing: 0.02em;
}
.rpt-header .back-link:hover { color: var(--fg-h); border-color: var(--line-strong); background: var(--card-2); }
.rpt-header .back-link .arrow { font-size: 14px; line-height: 1; }
.rpt-header h1 { font-size: var(--h1); font-weight: 600; margin: 0; color: var(--fg-h); letter-spacing: -0.01em; }
.rpt-header h1 .muted { color: var(--fg-3); font-weight: 400; }
.meta-row { display: flex; gap: 28px; font-size: 12.5px; color: var(--fg-2); text-align: right; justify-content: flex-end; }
.meta-row .k { color: var(--fg-4); display: block; margin-bottom: 3px; letter-spacing: 0.08em; }
.meta-row .v { color: var(--fg); font-size: 14.5px; }
.meta-row .v .hl { color: var(--info); }
.toc {
  display: flex; gap: 4px; margin-bottom: 32px; padding: 4px;
  background: var(--section); border: 1px solid var(--line); border-radius: 6px; font-size: 12.5px;
}
.toc a { color: var(--fg-2); padding: 6px 10px; border-radius: 4px; text-decoration: none; transition: all 0.15s; white-space: nowrap; }
.toc a:hover { color: var(--fg); background: var(--card); }
.toc a .n { color: var(--fg-4); margin-right: 6px; }
.summary {
  background: var(--section); border: 1px solid var(--line);
  border-left: 3px solid var(--emph); border-radius: 6px;
  padding: 22px 26px; margin-bottom: 40px;
}
.summary .label { font-size: 12.5px; letter-spacing: 0.1em; color: var(--emph); text-transform: uppercase; margin-bottom: 14px; }
.summary ol { margin: 0; padding: 0; list-style: none; display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.summary ol li { display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start; }
.summary ol li .num { font-family: "Inter", sans-serif; font-size: 28px; font-weight: 700; color: var(--emph); line-height: 1; opacity: 0.35; }
.summary ol li .txt { color: var(--fg); font-size: 15px; }
.summary ol li .txt strong { color: var(--fg-h); font-weight: 600; display: block; margin-bottom: 3px; }
.summary ol li .txt span { color: var(--fg-2); font-size: 14px; }
.section-head {
  display: flex; align-items: baseline; gap: 14px;
  margin: 56px 0 20px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
}
.section-head .sigil { font-size: var(--h2); font-weight: 600; color: var(--fg-3); letter-spacing: -0.005em; font-family: "Inter", sans-serif; font-variant-numeric: tabular-nums; }
.section-head h2 { font-size: var(--h2); font-weight: 600; margin: 0; color: var(--fg-h); letter-spacing: -0.005em; }
.section-head .hint { font-size: 12.5px; color: var(--fg-3); margin-left: auto; }
.game-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 18px; overflow: hidden; }
.gc-header { display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--line-soft); }
.gc-header .gc-idx { font-size: 12.5px; color: var(--fg-4); width: 28px; }
.gc-icon, .gcb-icon {
  width: 40px;
  height: 40px;
  border-radius: 9px;
  display: block;
  object-fit: cover;
  border: 1px solid var(--line-soft);
  background: var(--card-2);
  flex-shrink: 0;
}
.gcb-icon { width: 36px; height: 36px; border-radius: 8px; }
.gc-header .gc-title { font-size: 18.5px; font-weight: 500; color: var(--fg-2); letter-spacing: -0.005em; }
.gc-header .gc-studio { display: inline-block; margin-left: 10px; font-size: 12.5px; color: var(--fg-3); font-weight: 400; }
.gc-header .gc-version { font-size: 12.5px; color: var(--fg-2); text-align: right; }
.gc-header .gc-version .ver { color: var(--info); }
.gc-metrics { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--line-soft); }
.gc-metrics .m { padding: 14px 22px; border-right: 1px solid var(--line-soft); }
.gc-metrics .m:last-child { border-right: 0; }
.gc-metrics .m-k { font-size: 12px; color: var(--fg-4); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.gc-metrics .m-v { font-family: "Inter", sans-serif; font-size: 16.5px; font-weight: 500; color: var(--fg); }
.gc-metrics .m-v.pos { color: var(--pos); }
.gc-metrics .m-v.neg { color: var(--neg); }
.gc-metrics .m-v.warn { color: var(--warn); }
.gc-metrics .m-v .trend { font-size: 12.5px; color: var(--fg-3); margin-left: 6px; }

/* Trend section — chart + metrics explanation (overlay only) */
.trend-section {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
  gap: 24px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--card-2);
}
@media (max-width: 760px) { .trend-section { grid-template-columns: 1fr; } }
.trend-chart-wrap { }
.trend-chart-label {
  font-size: 12px;
  color: var(--fg-4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}
.trend-chart-wrap svg {
  width: 100%;
  height: auto;
  display: block;
  background: var(--card);
  border: 1px solid var(--line-soft);
  border-radius: 6px;
}
.trend-chart-foot {
  font-size: 12px;
  color: var(--fg-4);
  margin-top: 6px;
  font-style: italic;
}
.trend-metrics {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.tm-row {
  background: var(--card);
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  padding: 10px 14px;
}
.tm-k {
  font-size: 11.5px;
  color: var(--fg-4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 600;
}
.tm-v {
  font-family: "Inter", sans-serif;
  font-size: 16.5px;
  font-weight: 600;
  color: var(--fg-h);
  margin-bottom: 3px;
}
.tm-v.pos { color: var(--pos); }
.tm-v.neg { color: var(--neg); }
.tm-v.warn { color: var(--warn); }
.tm-trend {
  font-size: 13px;
  color: var(--fg-2);
  line-height: 1.45;
}
.pickup-timeline { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line-soft); border-bottom: 1px solid var(--line-soft); }
.pickup-cell { background: var(--card); padding: 14px 18px; position: relative; min-height: 96px; }
.pickup-cell .month { font-size: 11.5px; color: var(--fg-4); letter-spacing: 0.1em; margin-bottom: 8px; display: flex; justify-content: space-between; }
.pickup-cell .stars { color: var(--warn); font-size: 11.5px; letter-spacing: 1px; }
.pickup-cell .stars .off { color: var(--fg-4); }
.pickup-cell .swatch-row { display: flex; gap: 4px; align-items: center; margin-bottom: 6px; }
.pickup-cell .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.pickup-cell .char-names { font-size: 14px; color: var(--fg); font-weight: 500; margin-bottom: 4px; }
.pickup-cell .tag { font-size: 11.5px; color: var(--fg-3); margin-left: 6px; font-weight: 400; }
.pickup-cell .note { font-size: 13px; color: var(--fg-2); line-height: 1.45; }
.pickup-cell.unknown { opacity: 0.55; }
.pickup-cell.unknown .char-names { color: var(--fg-3); font-style: italic; }
body.palette-off .pickup-cell .swatch { background: var(--fg-4) !important; opacity: 0.5; }
.char-list { padding: 4px 0; }
.char-accordion { border-top: 1px solid var(--line-soft); }
.char-accordion:first-child { border-top: 0; }
.char-head { display: grid; grid-template-columns: 20px 1fr auto auto; gap: 14px; align-items: center; padding: 14px 22px; cursor: pointer; user-select: none; transition: background 0.12s; }
.char-head:hover { background: var(--card-2); }
.char-head .chev { width: 10px; height: 10px; border-right: 1.5px solid var(--fg-3); border-bottom: 1.5px solid var(--fg-3); transform: rotate(-45deg); transition: transform 0.2s; margin-left: 4px; }
.char-accordion.open .char-head .chev { transform: rotate(45deg); }
.char-head .c-name { font-size: 16px; font-weight: 600; color: var(--fg-h); }
.char-head .c-name .c-alt { color: var(--fg-3); font-weight: 400; font-size: 13.5px; margin-left: 8px; font-family: "Inter", sans-serif; }
.char-head .c-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.char-head .tag { font-size: 12px; color: var(--fg-2); padding: 2px 7px; border: 1px solid var(--line-strong); border-radius: 3px; background: var(--bg); }
.role-badge { font-family: "Inter", sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 3px; color: #FBF6EA; }
.role-badge.SS { background: var(--role-SS); }
.role-badge.S  { background: var(--role-S); }
.role-badge.A  { background: var(--role-A); }
.role-badge.T2 { background: var(--role-T2); }
.char-body { padding: 0 22px 22px 56px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
.char-splash {
  grid-column: span 2;
  width: 100%;
  max-height: 520px;
  object-fit: contain;
  object-position: center;
  border-radius: 6px;
  border: 1px solid var(--line);
  margin-bottom: 4px;
  background: linear-gradient(135deg, #1a1a24 0%, #2a2438 100%);
  display: block;
  padding: 12px 0;
}
.char-splash-fallback {
  grid-column: span 2;
  width: 100%;
  height: 120px;
  border: 1px dashed var(--line-strong);
  border-radius: 6px;
  background: repeating-linear-gradient(
    45deg, var(--line-soft), var(--line-soft) 6px,
    var(--card-2) 6px, var(--card-2) 12px
  );
  color: var(--fg-4);
  font-size: 12.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.char-body .f-label { font-size: 11.5px; color: var(--fg-4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.char-body .f-val { font-size: 14px; color: var(--fg); line-height: 1.55; }
.char-body .f-val.placeholder { color: var(--fg-4); font-style: italic; }
.user-eval { grid-column: span 2; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
.eval-col { background: var(--bg); border-left: 3px solid; padding: 10px 12px 10px 13px; border-radius: 2px; min-height: 80px; }
.eval-col.pos { border-color: var(--pos); }
.eval-col.neg { border-color: var(--neg); }
.eval-col.con { border-color: var(--warn); }
.eval-col .e-label { font-size: 11.5px; letter-spacing: 0.08em; margin-bottom: 6px; text-transform: uppercase; }
.eval-col.pos .e-label { color: var(--pos); }
.eval-col.neg .e-label { color: var(--neg); }
.eval-col.con .e-label { color: var(--warn); }
.eval-col .e-val { font-size: 13.5px; color: var(--fg-2); line-height: 1.5; }
.eval-col .e-val.placeholder { color: var(--fg-4); font-style: italic; }
.insight-box { grid-column: span 2; background: var(--card-2); border-left: 3px solid var(--info); padding: 12px 16px; border-radius: 2px; margin-top: 4px; }
.insight-box .i-label { font-size: 11.5px; letter-spacing: 0.1em; color: var(--info); margin-bottom: 6px; text-transform: uppercase; }
.insight-box .i-val { font-size: 14px; color: var(--fg); line-height: 1.6; }
.insight-box .i-val.placeholder { color: var(--fg-4); font-style: italic; }
.wiki-btn { grid-column: span 2; display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; margin-top: 4px; border: 1px solid var(--line-strong); background: transparent; color: var(--fg-2); font-size: 12.5px; border-radius: 3px; cursor: pointer; text-decoration: none; transition: all 0.15s; width: fit-content; justify-self: start; }
.wiki-btn:hover { color: var(--fg); border-color: var(--fg-3); }
.wiki-btn .glyph { opacity: 0.7; }
.insight-cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
.insight-card { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 18px 22px; display: grid; grid-template-columns: 40px 1fr auto; gap: 18px; align-items: start; }
.insight-card .idx { font-family: "Inter", sans-serif; font-size: 22px; font-weight: 700; color: var(--fg-4); line-height: 1; padding-top: 2px; }
.insight-card h3 { font-size: var(--h3); font-weight: 600; margin: 0 0 6px; color: var(--fg-h); }
.insight-card p { margin: 0; font-size: 14px; color: var(--fg-2); line-height: 1.6; }
.insight-card .sources { font-size: 11.5px; color: var(--fg-4); letter-spacing: 0.06em; text-align: right; line-height: 1.7; min-width: 140px; }
.matrix-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 6px; overflow-x: auto; }
.matrix { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.matrix thead th { background: var(--card-2); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line-strong); font-weight: 500; }
.matrix tbody td { padding: 12px 14px; border-bottom: 1px solid var(--line-soft); color: var(--fg-2); vertical-align: top; }
.matrix tbody tr:last-child td { border-bottom: 0; }
.matrix tbody td.row-label { color: var(--fg-h); font-weight: 500; font-size: 14px; }
.matrix tbody tr:hover td { background: rgba(43, 36, 26, 0.03); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot.full { background: var(--pos); }
.dot.half { background: var(--warn); }
.dot.none { background: var(--line-strong); }
.dodont { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dodont .col { background: var(--card); border: 1px solid; border-radius: 6px; padding: 18px 22px; }
.dodont .col.do   { border-color: rgba(94, 138, 74, 0.35); }
.dodont .col.dont { border-color: rgba(181, 69, 69, 0.35); }
.dodont .col h3 { font-size: 12.5px; letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 14px; }
.dodont .col.do h3 { color: var(--pos); }
.dodont .col.dont h3 { color: var(--neg); }
.dodont ul { margin: 0; padding: 0; list-style: none; }
.dodont ul li { padding: 8px 0 8px 22px; border-top: 1px solid var(--line-soft); font-size: 14px; color: var(--fg-2); line-height: 1.55; position: relative; }
.dodont ul li:first-child { border-top: 0; }
.dodont ul li::before { position: absolute; left: 0; top: 8px; font-size: 14.5px; line-height: 1.55; }
.dodont .col.do ul li::before { content: "+"; color: var(--pos); }
.dodont .col.dont ul li::before { content: "−"; color: var(--neg); }
.dodont ul li strong { color: var(--fg); font-weight: 500; }
.watchlist { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 8px 0; }
.watch-item { display: grid; grid-template-columns: 60px 32px 1fr; gap: 14px; align-items: center; padding: 12px 22px; border-top: 1px solid var(--line-soft); }
.watch-icon { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; border: 1px solid var(--line-soft); background: var(--card-2); display: block; }
.watch-icon-fallback {
  width: 32px; height: 32px; border-radius: 7px;
  border: 1px dashed var(--line-strong);
  background: var(--card-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12.5px; color: var(--fg-4); font-weight: 600;
}
.watch-item:first-child { border-top: 0; }
.watch-item .w-main .w-name { font-size: 15px; font-weight: 600; color: var(--fg-h); }
.watch-item .w-main .w-game { font-size: 12px; color: var(--fg-3); margin-left: 8px; }
.watch-item .w-main .w-why { font-size: 13.5px; color: var(--fg-2); margin-top: 3px; }
.watch-item .w-when {
  font-family: "Inter", sans-serif;
  font-size: 15.5px;
  font-weight: 700;
  color: var(--info);
  text-align: left;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}
.rpt-footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--line); display: grid; grid-template-columns: 2fr 1fr; gap: 40px; font-size: 13px; color: var(--fg-3); line-height: 1.7; }
.rpt-footer h4 { font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); margin: 0 0 10px; font-weight: 500; }
.rpt-footer ul { margin: 0; padding: 0 0 0 16px; }
.rpt-footer ul li { margin-bottom: 4px; }
.rpt-footer .sources-list span { color: var(--fg-2); }
.sources-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px 18px;
  margin-top: 4px;
}
.sources-grid .cat {
  background: var(--card);
  border: 1px solid var(--line-soft);
  border-radius: 5px;
  padding: 10px 12px;
}
.sources-grid .cat .cat-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-4);
  margin-bottom: 6px;
  font-weight: 600;
}
.sources-grid .cat .cat-item {
  font-size: 13px;
  color: var(--fg-2);
  line-height: 1.55;
}
.legend-bar { display: flex; align-items: center; gap: 18px; padding: 10px 16px; background: var(--section); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 18px; font-size: 12.5px; color: var(--fg-3); flex-wrap: wrap; }
.legend-bar .lbl { color: var(--fg-4); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; }
.legend-bar .item { display: inline-flex; align-items: center; gap: 6px; color: var(--fg-2); }
.legend-bar .item .sw { width: 10px; height: 10px; border-radius: 2px; }
.tweaks { position: fixed; right: 24px; bottom: 24px; width: 260px; background: var(--card); border: 1px solid var(--line-strong); border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); padding: 14px 16px; z-index: 50; font-size: 13.5px; display: block; }
.tweaks h5 { font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin: 0 0 12px; display: flex; justify-content: space-between; }
.tweaks h5 .close { color: var(--fg-4); cursor: pointer; }
.tweaks .tw-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--line-soft); }
.tweaks .tw-row:first-of-type { border-top: 0; }
.tweaks .tw-row label { color: var(--fg); font-size: 13.5px; }
.tweaks .tw-row .desc { color: var(--fg-4); font-size: 12px; margin-top: 2px; }

function RevenueChart({ data }) {
  const W = 440, H = 200;
  const pad = { t: 26, r: 30, b: 38, l: 44 };
  const values = data.map(d => d.value);
  const vMax = Math.max(...values);
  const vMin = Math.min(...values);
  const pad5 = Math.max(1, (vMax - vMin) * 0.15);
  const yMax = Math.ceil((vMax + pad5) / 5) * 5;
  const yMin = Math.max(0, Math.floor((vMin - pad5) / 5) * 5);
  const range = yMax - yMin || 1;

  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;
  const xs = data.map((_, i) => pad.l + (i * plotW / (data.length - 1)));
  const ys = data.map(d => pad.t + plotH - ((d.value - yMin) / range) * plotH);

  const first = data[0].value, last = data[data.length - 1].value;
  const pct = first > 0 ? ((last - first) / first) * 100 : 0;
  const trend = pct > 3 ? "pos" : pct < -3 ? "neg" : "flat";
  const lineColor = trend === "pos" ? "#5E8A4A" : trend === "neg" ? "#B54545" : "#4A6FA5";

  const pathD = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" ");
  const areaD = pathD + ` L ${xs[xs.length - 1]} ${pad.t + plotH} L ${xs[0]} ${pad.t + plotH} Z`;

  const yTicks = 4;
  const yGrid = Array.from({ length: yTicks + 1 }).map((_, i) => {
    const v = yMin + (i * range / yTicks);
    const y = pad.t + plotH - (i * plotH / yTicks);
    return { v, y };
  });

  return (
    <svg viewBox={`0 0 ${W} ${H}`} role="img" aria-label="월간 매출 추이">
      {/* Y grid */}
      {yGrid.map((g, i) => (
        <g key={i}>
          <line x1={pad.l} x2={W - pad.r} y1={g.y} y2={g.y} stroke="#E2D6BA" strokeWidth="1" strokeDasharray={i === 0 ? "0" : "2 3"} />
          <text x={pad.l - 8} y={g.y + 3} textAnchor="end" fontSize="11" fill="#8C7F66" fontFamily="Inter">${g.v.toFixed(0)}M</text>
        </g>
      ))}
      {/* X labels */}
      {data.map((d, i) => (
        <g key={i}>
          <text x={xs[i]} y={H - pad.b + 14} textAnchor="middle" fontSize="11.5" fill="#8C7F66" letterSpacing="0.05em">{d.month}</text>
          <text x={xs[i]} y={H - pad.b + 26} textAnchor="middle" fontSize="10.5" fill="#B0A386">{d.label}</text>
        </g>
      ))}
      {/* Area fill */}
      <path d={areaD} fill={lineColor} opacity="0.08" />
      {/* Line */}
      <path d={pathD} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {/* Points + value labels */}
      {xs.map((x, i) => (
        <g key={i}>
          <circle cx={x} cy={ys[i]} r="4.5" fill="#FFFBF1" stroke={lineColor} strokeWidth="2" />
          <text x={x} y={ys[i] - 10} textAnchor="middle" fontSize="12" fontWeight="600" fill="#1A140D" fontFamily="Inter">${data[i].value.toFixed(1)}M</text>
        </g>
      ))}
      {/* Trend indicator top-right */}
      <text x={W - pad.r} y={pad.t - 10} textAnchor="end" fontSize="11.5" fill={lineColor} fontFamily="Inter" fontWeight="600">
        {trend === "pos" ? "▲" : trend === "neg" ? "▼" : "●"} {pct > 0 ? "+" : ""}{pct.toFixed(1)}% (3개월)
      </text>
    </svg>
  );
}

          <li><strong>매출 집계 범위:</strong> Sensor Tower 기반 iOS + Google Play 추정치만 반영. 호요버스 HoYoLAB 웹스토어·쿠로 자체 결제·PC/PS5 콘솔 매출·중국 빌리빌리·탭탭 스토어는 전부 미집계. 원신·스타레일·명조는 실제 매출이 집계치의 1.5~2배 수준으로 추정됨. 절대 금액보다 <strong>전월 대비 방향성(±%)</strong> 중심으로 해석 권장.</li>
          <li><strong>티어 평가:</strong> T2/S/SS 등급은 한국(게임톡·Vortex Gaming·gamsgo)과 영문(prydwen·Game8) 주요 공략 사이트의 종합 평가 가중 평균. 공식 지표 아님. 출시 3~4주 시점 데이터로 밸런스 패치에 따라 후속 변동 가능.</li>
          <li><strong>유저 평가 3분할(긍정·부정·논란):</strong> 인벤·루리웹·나무위키 여담·아카라이브·디시 갤러리 상위 게시글과 r/gachagaming·ResetEra 월간 스레드의 정성 샘플링. 정량 sentiment 분석 아니며 통계적 대표성 없음.</li>
          <li><strong>추정치 구간:</strong> 스타레일 2026/1 (v3.7 말기 연장), 니케 2025/12 매출 수치는 1차 소스가 제한적이라 전후 월 매출 대비로 추정치 처리. 정기 발행 운영 시 실수치 확보 후 보정 권장.</li>
          <li><strong>서버 기준:</strong> 모든 픽업 일정은 글로벌(아시아/북미) 기준. 중국 본토 서버(빌리빌리) 편성 및 시기와 상이할 수 있음.</li>
          <li><strong>성별 분류:</strong> '여캐/남캐'는 공식 설정 기반 분류. 중성·인간 외 존재(스파키 가면 자아 등)는 외형 기준으로 해당 슬롯에 배치.</li>
        </ul>
      </div>
      <div className="sources-list">
        <h4>주요 출처 · SOURCES</h4>
        <div className="sources-grid">
          <div className="cat">
            <div className="cat-label">매출 · 순위</div>
            <div className="cat-item">Sensor Tower Blog</div>
            <div className="cat-item">ixbt.games (월간 Top Grossing)</div>
            <div className="cat-item">인벤 모바일게임 게시판</div>
          </div>
          <div className="cat">
            <div className="cat-label">픽업 · 버전 일정</div>
            <div className="cat-item">BitTopup Wiki</div>
            <div className="cat-item">gamsgo · Vortex Gaming</div>
            <div className="cat-item">각 게임 공식 · HoYoLAB</div>
          </div>
          <div className="cat">
            <div className="cat-label">캐릭터 제원</div>
            <div className="cat-item">Fandom Wiki (각 타이틀)</div>
            <div className="cat-item">나무위키 · Endfield Talos Wiki</div>
            <div className="cat-item">공식 캐릭터 PV</div>
          </div>
          <div className="cat">
            <div className="cat-label">유저 반응</div>
            <div className="cat-item">인벤 · 루리웹 · 아카라이브</div>
            <div className="cat-item">게임톡 · 디스이즈게임</div>
            <div className="cat-item">r/gachagaming · ResetEra</div>
          </div>
        </div>
        <div style={{ marginTop: 14, color: "var(--fg-4)", fontSize: 10.5, lineHeight: 1.55 }}>
          © Internal Use Only · 본 보고서는 경쟁 분석 목적의 내부 문서이며,<br/>
          게임·캐릭터 IP는 각 퍼블리셔 소유. 인용·재배포 금지.
        </div>
      </div>
    </footer>
  );
}

function TweaksPanel() {
  const [paletteOn, setPaletteOn] = useState(true);
  useEffect(() => {
    document.body.classList.toggle("palette-off", !paletteOn);
  }, [paletteOn]);
  const close = (e) => {
    e.currentTarget.closest(".tweaks").style.display = "none";
  };
  return (
    <div className="tweaks">
      <h5>
        TWEAKS
        <span className="close" onClick={close}>✕</span>
      </h5>
      <div className="tw-row">
        <div>
          <label>픽업 팔레트</label>
          <div className="desc">{paletteOn ? "여·남·복각·혼합 컬러 코드 사용" : "중립 회색 스와치"}</div>
        </div>
        <div
          className={"switch " + (paletteOn ? "on" : "")}
          onClick={() => setPaletteOn(!paletteOn)}
        />
      </div>
    </div>
  );
}

function GameCardButton({ game, onClick }) {
  const charCount = game.characters.length;
  return (
    <button className="gcb" onClick={onClick}>
      <div className="gcb-top">
        {game.icon
          ? <img className="gcb-icon" src={game.icon} alt={game.title + " icon"} loading="lazy" />
          : <div className="gcb-idx mono">{game.idx}</div>}
        <div className="gcb-title-wrap">
          <div className="gcb-title">{game.title}</div>
          <div className="gcb-studio mono">{game.studio} · {game.version}</div>
        </div>
        <div className="gcb-arrow">→</div>
      </div>
      <div className="gcb-metrics">
        {game.metrics.map((m, i) => (
          <div className="gcb-m" key={i}>
            <div className="gcb-m-k mono">{m.k}</div>
            <div className={"gcb-m-v " + (m.tone || "")}>{m.v}</div>
          </div>
        ))}
      </div>
      <div className="gcb-timeline">
        {game.pickup.map((c, i) => (
          <div className={"gcb-tl " + (c.unknown ? "unknown" : "")} key={i}>
            <div className="gcb-tl-m mono">{c.month}</div>
            <div className="gcb-tl-sw">
              {c.tags.map((t, j) => <span className="sw" style={{ background: t }} key={j} />)}
            </div>
            <div className="gcb-tl-n">{c.chars}</div>
          </div>
        ))}
      </div>
      <div className="gcb-foot mono">
        <span>{charCount} character{charCount > 1 ? "s" : ""}</span>
        <span className="gcb-cta">세부 리포트 열기 ↗</span>
      </div>
    </button>
  );
}

function GameDetailOverlay({ game, onClose, onPrev, onNext }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft") onPrev();
      if (e.key === "ArrowRight") onNext();
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [game, onClose, onPrev, onNext]);
  return (
    <div className="detail-overlay" onClick={onClose}>
      <div className="detail-panel" onClick={(e) => e.stopPropagation()}>
        <div className="detail-topbar">
          <div className="detail-breadcrumb mono">
            <span style={{ color: "var(--fg-4)" }}>DASHBOARD</span>
            <span style={{ color: "var(--fg-4)", margin: "0 8px" }}>›</span>
            <span style={{ color: "var(--fg-2)" }}>04 GAME CATALOG</span>
            <span style={{ color: "var(--fg-4)", margin: "0 8px" }}>›</span>
            <span style={{ color: "var(--info)" }}>{game.idx}</span>
          </div>
          <div className="detail-nav">
            <button className="dn-btn" onClick={onPrev} title="이전 게임 (←)">← 이전</button>
            <button className="dn-btn" onClick={onNext} title="다음 게임 (→)">다음 →</button>
            <button className="dn-btn dn-close" onClick={onClose} title="닫기 (Esc)">✕ 닫기</button>
          </div>
        </div>
        <div className="detail-scroll">
          <div className="detail-inner">
            <GameCard game={game} />
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeIdx, setActiveIdx] = useState(null);
  const open  = (i) => setActiveIdx(i);
  const close = () => setActiveIdx(null);
  const prev  = () => setActiveIdx((i) => i === null ? 0 : (i - 1 + GAMES.length) % GAMES.length);
  const next  = () => setActiveIdx((i) => i === null ? 0 : (i + 1) % GAMES.length);
  return (
    <div className="page">
      <Header />
      <TOC />
      <Summary />
      <SectionHead id="s2" sigil="01" title="공통 트렌드 분석 (cross-cutting insights)" hint="5 insights · 2월 실데이터 기반" />
      <InsightCards />
      <SectionHead id="s3" sigil="02" title="메커니즘·기믹 비교 매트릭스" hint="6 games × 5 cols" />
      <MatrixTable />
      <SectionHead id="s4" sigil="03" title="Do / Don't 체크리스트" hint="2월 사례 기반 재추출" />
      <DoDont />
      <SectionHead id="s1" sigil="04" title="게임별 카탈로그" hint="카드 선택 → 세부 리포트 (← → 키보드)" />
      <LegendBar />
      <div className="game-grid">
        {GAMES.map((g, i) => (
          <GameCardButton game={g} onClick={() => open(i)} key={i} />
        ))}
      </div>
      <SectionHead id="s5" sigil="05" title="다음 달 주목 캐릭터" hint="watchlist · 2026.03" />
      <Watchlist />
      <Footer />
      <TweaksPanel />
      {activeIdx !== null && (
        <GameDetailOverlay
          game={GAMES[activeIdx]}
          onClose={close}
          onPrev={prev}
          onNext={next}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
