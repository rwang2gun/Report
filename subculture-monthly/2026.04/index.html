<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Subculture Monthly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    html, body { margin: 0; padding: 0; background: #ECE5CC; color: #1a1a1a;
                 font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    .reader {
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding: 28px 40px 40px;
      box-sizing: border-box;
    }

    .reader-head {
      display: flex; align-items: baseline; justify-content: space-between;
      padding-bottom: 14px; border-bottom: 1px solid rgba(26,26,26,0.2);
      margin-bottom: 28px;
    }
    .reader-head .title {
      font-family: 'EB Garamond', serif; font-size: 24px; font-weight: 500;
      letter-spacing: -0.01em; color: #1a1a1a;
    }
    .reader-head .title em { font-style: italic; color: #1a1a1a; }
    .reader-head .meta {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(26,26,26,0.7); text-align: right;
    }
    .reader-head .meta .accent { color: #C44536; font-weight: 600; }

    .book-area {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 22px;
    }

    /* Each .page is a flippable leaf. */
    .page {
      background: #FCFAF3;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(26,26,26,0.08);
    }
    .page .page-inner { transform-origin: top left; }
    /* Hard-cover pages — slightly darker tone, beefier shadow when stiff */
    .page--stiff {
      background: #F2EAD3;
      box-shadow: inset 0 0 0 1px rgba(26,26,26,0.18),
                  0 4px 22px -10px rgba(0,0,0,0.4);
    }

    .controls {
      display: flex; gap: 12px; align-items: center;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.14em; color: rgba(26,26,26,0.78); text-transform: uppercase;
    }
    .controls button {
      font-family: inherit; font-size: inherit; letter-spacing: inherit;
      text-transform: inherit; padding: 8px 14px;
      background: #1a1a1a; color: #FCFAF3; border: none; cursor: pointer;
      transition: background 0.15s;
    }
    .controls button:hover { background: #C44536; }
    .controls .pageno {
      padding: 8px 14px; background: rgba(26,26,26,0.06);
      color: #1a1a1a; font-weight: 600;
    }
    .controls .hint { margin-left: 12px; opacity: 0.55; }

    /* ─── Bookmark rail (right, desktop fixed) ────────────────────────── */
    .bookmark-rail {
      position: fixed; top: 100px; right: 24px;
      width: 220px; padding: 14px 18px;
      background: #FCFAF3; border-left: 2px solid #1a1a1a;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      box-shadow: 0 8px 24px -16px rgba(0,0,0,0.3);
      z-index: 100;
      max-height: calc(100vh - 140px); overflow-y: auto;
    }
    .bookmark-rail .rail-head {
      font-size: 9px; color: #C44536; font-weight: 600;
      padding-bottom: 8px; border-bottom: 1px solid rgba(26,26,26,0.18); margin-bottom: 10px;
    }
    .bookmark-rail .rail-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0; cursor: pointer; color: rgba(26,26,26,0.7);
      border-bottom: 1px solid rgba(26,26,26,0.06);
      transition: color 0.15s, background 0.15s;
    }
    .bookmark-rail .rail-item:last-child { border-bottom: none; }
    .bookmark-rail .rail-item:hover { color: #C44536; background: rgba(196,69,54,0.04); }
    .bookmark-rail .rail-item.active { color: #1a1a1a; font-weight: 600; }
    .bookmark-rail .rail-item.active .rail-page { color: #C44536; }
    .bookmark-rail .rail-page { font-weight: 500; opacity: 0.6; }

    /* ─── Mobile toggle + fullscreen modal ────────────────────────────── */
    .bookmark-toggle {
      background: #1a1a1a; color: #FCFAF3;
      border: none; padding: 8px 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      display: none;
    }
    .bookmark-toggle:hover { background: #C44536; }
    .bookmark-modal {
      position: fixed; inset: 0; background: rgba(26,26,26,0.96);
      z-index: 9999; display: none; flex-direction: column;
      padding: 40px 24px; color: #FCFAF3; overflow-y: auto;
    }
    .bookmark-modal.open { display: flex; }
    .bookmark-modal .modal-head {
      display: flex; justify-content: space-between; align-items: baseline;
      padding-bottom: 12px; border-bottom: 1px solid rgba(252,250,243,0.3);
      margin-bottom: 24px;
      font-family: 'EB Garamond', serif; font-size: 24px;
    }
    .bookmark-modal .modal-close {
      background: none; border: none; color: #FCFAF3;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.18em; cursor: pointer; padding: 6px 12px;
    }
    .bookmark-modal .modal-item {
      display: flex; justify-content: space-between; padding: 14px 0;
      border-bottom: 1px solid rgba(252,250,243,0.15);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
      color: rgba(252,250,243,0.78);
    }
    .bookmark-modal .modal-item:hover { color: #FCFAF3; }
    .bookmark-modal .modal-item.active { color: #FCFAF3; font-weight: 600; }
    .bookmark-modal .modal-item.active .rail-page { color: #C44536; }

    @media (max-width: 1340px) {
      .bookmark-rail { display: none; }
      .bookmark-toggle { display: inline-block; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data + Component layers — separated. -->
  <script type="text/babel" src="issue-2026-04.jsx"></script>
  <script type="text/babel" src="magazine-shared-v2.jsx"></script>
  <script type="text/babel" src="magazine-pages-front.jsx"></script>
  <script type="text/babel" src="magazine-pages-back.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const PAGE_W = 1200;
    const PAGE_H = 1600;
    const PAGE_RATIO = PAGE_H / PAGE_W;

    function computeBookSize() {
      const vw = window.innerWidth  || 1280;
      const vh = window.innerHeight || 800;
      const railVisible = vw > 1340;
      const sidePad = 80;
      const railReserve = railVisible ? 260 : 40;
      const horizBudget = vw - sidePad - railReserve;
      const wFromWidth  = Math.floor(horizBudget / 2);
      const vertChrome = 220;
      const hFromHeight = vh - vertChrome;
      const wFromHeight = Math.floor(hFromHeight / PAGE_RATIO);
      const w = Math.max(420, Math.min(900, wFromWidth, wFromHeight));
      const h = Math.round(w * PAGE_RATIO);
      return { w, h };
    }

    // ─── Section anchors for bookmark rail ───────────────────────────────
    // Indices reflect 24-page layout:
    //   0   jacket front (stiff)
    //   1   endpaper front
    //   2   cover (insights + KPI)
    //   3   TOC
    //   4   dashboard
    //   5-16 6 game spreads (visual left, body right)
    //   17  cross-game analysis
    //   18  industry desk
    //   19  community pulse
    //   20  watchlist
    //   21  colophon
    //   22  endpaper back
    //   23  jacket back (stiff)
    const SECTIONS = [
      { id: 'cover',     label: '표지',         page: 2,  key: '1' },
      { id: 'toc',       label: '목차',         page: 3,  key: '2' },
      { id: 'numbers',   label: '데이터',       page: 4,  key: '3' },
      { id: 'gi',        label: '원신',         page: 5,  key: '4' },
      { id: 'hsr',       label: '스타레일',     page: 7,  key: '5' },
      { id: 'zzz',       label: '젠레스',       page: 9,  key: '6' },
      { id: 'ww',        label: '명조',         page: 11, key: '7' },
      { id: 'ef',        label: '엔드필드',     page: 13, key: '8' },
      { id: 'nk',        label: '니케',         page: 15, key: '9' },
      { id: 'cross',     label: '크로스',       page: 17 },
      { id: 'industry',  label: '산업',         page: 18 },
      { id: 'community', label: '커뮤니티',     page: 19 },
      { id: 'watch',     label: 'Watchlist',    page: 20 },
      { id: 'colophon',  label: '콜로폰',       page: 21 },
    ];
    function sectionForPage(p) {
      let s = SECTIONS[0];
      for (const x of SECTIONS) if (x.page <= p) s = x;
      return s;
    }

    function BookPage({ children, stiff, bookW }) {
      const scale = bookW / PAGE_W;
      const cls = 'page' + (stiff ? ' page--stiff' : '');
      const dataAttrs = stiff ? { 'data-density': 'hard' } : {};
      return (
        <div className={cls} {...dataAttrs}>
          <div className="page-inner" style={{ width: PAGE_W, height: PAGE_H, transform: `scale(${scale})` }}>
            {children}
          </div>
        </div>
      );
    }

    function buildBookPages(D) {
      const pages = [];
      pages.push({ key: 'p-jacket-front',   stiff: true,  el: <HardFrontCover meta={D.meta} /> });
      pages.push({ key: 'p-endpaper-front', stiff: false, el: <EndpaperFront /> });
      pages.push({ key: 'p00', el: <CoverPage meta={D.meta} insights={D.insights} /> });
      pages.push({ key: 'p01', el: <TocPage meta={D.meta} games={D.games} /> });
      pages.push({ key: 'p02', el: <DataDashboardPage meta={D.meta} {...D.dashboard} /> });
      D.games.forEach((g, i) => {
        const leftNo  = `P.${String(3 + i * 2).padStart(2, "0")}`;
        const rightNo = `P.${String(4 + i * 2).padStart(2, "0")}`;
        pages.push({ key: `p${leftNo}`,  el: <GameFeatureVisualPage game={g} index={i} total={D.games.length} pageNo={leftNo} issue={D.meta.issue} /> });
        pages.push({ key: `p${rightNo}`, el: <GameFeatureBodyPage   game={g} index={i} total={D.games.length} pageNo={rightNo} prevPageNo={leftNo} issue={D.meta.issue} /> });
      });
      pages.push({ key: 'p15', el: <CrossAnalysisPage meta={D.meta} {...D.crossAnalysis} /> });
      pages.push({ key: 'p16', el: <IndustryDeskPage  meta={D.meta} {...D.industry} /> });
      pages.push({ key: 'p17', el: <CommunityPulsePage meta={D.meta} {...D.community} /> });
      pages.push({ key: 'p18', el: <WatchlistPage     meta={D.meta} {...D.watchlist} /> });
      pages.push({ key: 'p19', el: <ColophonPage      meta={D.meta} {...D.colophon} /> });
      pages.push({ key: 'p-endpaper-back', stiff: false, el: <EndpaperBack /> });
      pages.push({ key: 'p-jacket-back',   stiff: true,  el: <HardBackCover meta={D.meta} /> });
      return pages;
    }

    function BookmarkRail({ flipRef, currentPage, mobileOpen, setMobileOpen }) {
      const active = sectionForPage(currentPage).id;
      const jump = (p) => { flipRef.current && flipRef.current.turnToPage(p); setMobileOpen(false); };
      return (
        <React.Fragment>
          <nav className="bookmark-rail" aria-label="섹션 점프">
            <div className="rail-head">CONTENTS · {SECTIONS.length} SECTIONS</div>
            {SECTIONS.map(s => (
              <div key={s.id}
                   className={'rail-item' + (s.id === active ? ' active' : '')}
                   onClick={() => jump(s.page)}>
                <span>{s.label}{s.key ? ' · ' + s.key : ''}</span>
                <span className="rail-page">P.{String(s.page).padStart(2,'0')}</span>
              </div>
            ))}
          </nav>
          <div className={'bookmark-modal' + (mobileOpen ? ' open' : '')} role="dialog" aria-modal="true">
            <div className="modal-head">
              <span>Contents</span>
              <button className="modal-close" onClick={() => setMobileOpen(false)}>CLOSE ✕</button>
            </div>
            {SECTIONS.map(s => (
              <div key={s.id}
                   className={'modal-item' + (s.id === active ? ' active' : '')}
                   onClick={() => jump(s.page)}>
                <span>{s.label}{s.key ? ' (단축키 ' + s.key + ')' : ''}</span>
                <span className="rail-page">P.{String(s.page).padStart(2,'0')}</span>
              </div>
            ))}
          </div>
        </React.Fragment>
      );
    }

    function FlipBook({ mobileOpen, setMobileOpen }) {
      const D = ISSUE_2026_04;
      const pages = buildBookPages(D);
      const bookRef = React.useRef(null);
      const flipRef = React.useRef(null);
      const [page, setPage] = React.useState(0);
      const [total, setTotal] = React.useState(pages.length);
      const [bookSize, setBookSize] = React.useState(computeBookSize);
      const pageRef = React.useRef(0);
      pageRef.current = page;

      React.useEffect(() => {
        if (!bookRef.current) return;
        const start = pageRef.current || 0;
        const flip = new St.PageFlip(bookRef.current, {
          width: bookSize.w, height: bookSize.h,
          size: "fixed",
          minWidth: 300, maxWidth: 1400,
          minHeight: 400, maxHeight: 1900,
          maxShadowOpacity: 0.55,
          showCover: true,
          mobileScrollSupport: false,
          drawShadow: true,
          flippingTime: 700,
          usePortrait: false,
          autoSize: false,
          startPage: start,
        });
        flip.loadFromHTML(bookRef.current.querySelectorAll('.page'));
        flip.on('flip', (e) => setPage(e.data));
        setTotal(flip.getPageCount());
        flipRef.current = flip;
        return () => { try { flip.destroy(); } catch (e) {} };
      }, [bookSize.w, bookSize.h]);

      React.useEffect(() => {
        let t;
        const onResize = () => {
          clearTimeout(t);
          t = setTimeout(() => {
            const next = computeBookSize();
            setBookSize(prev => (prev.w === next.w && prev.h === next.h) ? prev : next);
          }, 180);
        };
        window.addEventListener('resize', onResize);
        return () => { clearTimeout(t); window.removeEventListener('resize', onResize); };
      }, []);

      React.useEffect(() => {
        const onKey = (e) => {
          if (e.target && /input|textarea/i.test(e.target.tagName)) return;
          if (!flipRef.current) return;
          if (e.key === 'ArrowLeft')       { flipRef.current.flipPrev(); }
          else if (e.key === 'ArrowRight') { flipRef.current.flipNext(); }
          else if (e.key === 't' || e.key === 'T') { setMobileOpen(o => !o); }
          else if (e.key === 'Escape')     { setMobileOpen(false); }
          else if (/^[0-9]$/.test(e.key)) {
            const target = SECTIONS.find(s => s.key === e.key);
            if (target) flipRef.current.turnToPage(target.page);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [setMobileOpen]);

      return (
        <React.Fragment>
          <div className="book-area">
            <div id="book" ref={bookRef} style={{ width: bookSize.w * 2, height: bookSize.h }}>
              {pages.map(p => <BookPage key={p.key} stiff={p.stiff} bookW={bookSize.w}>{p.el}</BookPage>)}
            </div>
            <div className="controls">
              <button onClick={() => flipRef.current && flipRef.current.flipPrev()}>← PREV</button>
              <span className="pageno">{String(page).padStart(2, "0")} / {String(total - 1).padStart(2, "0")}</span>
              <button onClick={() => flipRef.current && flipRef.current.flipNext()}>NEXT →</button>
              <span className="hint">← → · T · 0–9 단축키 · 모서리를 끌어 넘기기</span>
            </div>
          </div>
          <BookmarkRail flipRef={flipRef} currentPage={page} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
        </React.Fragment>
      );
    }

    function App() {
      const D = ISSUE_2026_04;
      const [mobileOpen, setMobileOpen] = React.useState(false);
      return (
        <div className="reader">
          <header className="reader-head">
            <div>
              <div className="title">{D.meta.title} · <em>{D.meta.issue}</em></div>
            </div>
            <div style={{display:"flex", alignItems:"baseline", gap: 14}}>
              <div className="meta">
                <span className="accent">{D.meta.coverDate}</span>
                <span style={{marginLeft: 12, opacity: 0.6}}>{D.meta.tagline}</span>
              </div>
              <button className="bookmark-toggle" onClick={() => setMobileOpen(true)}>≡ INDEX</button>
            </div>
          </header>
          <FlipBook mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
