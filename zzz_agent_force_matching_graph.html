let fVer='all',fAttr='all',fCls='all',fTag='all';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tip=document.getElementById('tooltip');
let W,H,dpr;
function resize(){const r=canvas.getBoundingClientRect();dpr=devicePixelRatio||1;W=r.width;H=Math.max(620,W*0.7);canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();

let nodes=[],links=[],sim=null,dragging=null,hovered=null;

function filtered(){
  return A.filter(a=>{
    if(fVer!=='all'&&a.ver!==fVer) return false;
    if(fAttr!=='all'&&a.attr!==fAttr) return false;
    if(fCls!=='all'&&a.cls!==fCls) return false;
    if(fTag!=='all'){
      const hasTag=a.acts.some(ac=>[...ac.fx,...ac.cc,...ac.dmg].includes(fTag));
      if(!hasTag) return false;
    }
    return true;
  });
}

function build(){
  const fa=filtered();
  const edgeMap=new Map();
  fa.forEach(a=>a.acts.forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{
    const k=a.id+'|'+t;edgeMap.set(k,(edgeMap.get(k)||0)+1);
  })));
  const usedTags=new Set();edgeMap.forEach((v,k)=>usedTags.add(k.split('|')[1]));
  const tN=[...usedTags].map(t=>({type:'tag',label:t,color:TAG_C[t]||'#888',x:W/2+(Math.random()-.5)*W*.3,y:H/2+(Math.random()-.5)*H*.3,vx:0,vy:0,r:0}));
  const aN=fa.map(a=>({type:'agent',id:a.id,label:a.name,cls:a.cls,attr:a.attr,fac:a.fac,ver:a.ver,color:CLS_C[a.cls],x:W/2+(Math.random()-.5)*W*.7,y:H/2+(Math.random()-.5)*H*.7,vx:0,vy:0,r:12,acts:a.acts}));
  nodes=[...tN,...aN];
  links=[];
  edgeMap.forEach((w,k)=>{const[aid,tag]=k.split('|');const si=nodes.findIndex(n=>n.type==='tag'&&n.label===tag);const ti=nodes.findIndex(n=>n.type==='agent'&&n.id===+aid);if(si>=0&&ti>=0)links.push({source:si,target:ti,weight:w});});
  tN.forEach(t=>{const idx=nodes.indexOf(t);const cnt=links.filter(l=>l.source===idx||l.target===idx);t.r=Math.min(40,9+cnt.reduce((s,l)=>s+l.weight,0)*0.6);});
  const st=document.getElementById('stats');
  st.innerHTML=[{l:'에이전트',v:fa.length},{l:'태그',v:usedTags.size},{l:'연결선',v:links.length},{l:'액션',v:fa.reduce((s,a)=>s+a.acts.length,0)}].map(s=>`<div class="stat-card"><div class="label">${s.l}</div><div class="val">${s.v}</div></div>`).join('');
  if(sim)cancelAnimationFrame(sim);
  run();
}

function run(){
  for(let it=0;it<2;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy)||1;
      let rep=nodes[i].type==='tag'&&nodes[j].type==='tag'?2000:400;
      let f=rep/(d*d);nodes[i].vx-=dx/d*f;nodes[i].vy-=dy/d*f;nodes[j].vx+=dx/d*f;nodes[j].vy+=dy/d*f;
    }
    links.forEach(l=>{const a=nodes[l.source],b=nodes[l.target];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;let f=(d-100)*0.002*Math.min(l.weight,5);a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;});
    nodes.forEach(n=>{n.vx+=(W/2-n.x)*0.0005;n.vy+=(H/2-n.y)*0.0005;n.vx*=0.78;n.vy*=0.78;if(n!==dragging){n.x+=n.vx;n.y+=n.vy;}n.x=Math.max(n.r+4,Math.min(W-n.r-4,n.x));n.y=Math.max(n.r+4,Math.min(H-n.r-4,n.y));});
  }
  draw();sim=requestAnimationFrame(run);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const hi=hovered;const cs=new Set();
  if(hi!==null)links.forEach(l=>{if(l.source===hi||l.target===hi){cs.add(l.source);cs.add(l.target);}});
  links.forEach(l=>{const a=nodes[l.source],b=nodes[l.target];const hl=hi!==null&&(l.source===hi||l.target===hi);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=hl?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.12)';ctx.lineWidth=hl?Math.min(l.weight*.7,4):0.8;ctx.stroke();});
  nodes.forEach((n,i)=>{
    const hl=hi===i;const dim=hi!==null&&!cs.has(i)&&hi!==i;ctx.globalAlpha=dim?0.08:hl?1:0.88;
    if(n.type==='tag'){
      const s=n.r;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(Math.PI/4);ctx.beginPath();ctx.rect(-s/2,-s/2,s,s);ctx.fillStyle=n.color+'30';ctx.fill();ctx.strokeStyle=n.color+'88';ctx.lineWidth=hl?2:1;ctx.stroke();ctx.restore();
      ctx.fillStyle='#fff';ctx.font=`600 ${Math.max(8,Math.min(11,n.r*0.55))}px "Noto Sans KR",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.label,n.x,n.y);
    } else {
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+(hl?3:0),0,Math.PI*2);ctx.fillStyle=n.color+(hl?'':'bb');ctx.fill();
      if(hl){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
      ctx.beginPath();ctx.arc(n.x+n.r*.55,n.y-n.r*.55,2.5,0,Math.PI*2);ctx.fillStyle=ATTR_C[n.attr]||'#888';ctx.fill();
      ctx.fillStyle='#fff';ctx.font='500 8px "Noto Sans KR",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      const nm=n.label.length>4?n.label.slice(0,4)+'…':n.label;ctx.fillText(nm,n.x,n.y);
    }
    ctx.globalAlpha=1;
  });
}

function getN(x,y){return nodes.findIndex(n=>Math.hypot(n.x-x,n.y-y)<=n.r+5);}
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(dragging){dragging.x=mx;dragging.y=my;tip.style.display='none';return;}
  const idx=getN(mx,my);hovered=idx>=0?idx:null;canvas.style.cursor=hovered!==null?'pointer':'grab';
  if(hovered!==null){
    const n=nodes[hovered],conns=links.filter(l=>l.source===hovered||l.target===hovered);
    if(n.type==='tag'){const ags=conns.map(l=>nodes[l.source===hovered?l.target:l.source].label);tip.innerHTML=`<div style="font-weight:500;color:${n.color}">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">연결 ${ags.length}명: ${ags.join(', ')}</div>`;}
    else{const tags=conns.map(l=>nodes[l.source===hovered?l.target:l.source].label);tip.innerHTML=`<div style="font-weight:500">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">${n.cls} · ${n.attr} · ${n.fac} · v${n.ver}</div><div style="font-size:11px;margin-top:2px">태그: ${tags.join(', ')}</div><div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px">액션 ${n.acts.length}개</div>`;}
    tip.style.display='block';tip.style.left=Math.min(e.clientX+14,innerWidth-340)+'px';tip.style.top=(e.clientY-12)+'px';
  } else tip.style.display='none';
});
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();const idx=getN(e.clientX-r.left,e.clientY-r.top);if(idx>=0){dragging=nodes[idx];canvas.style.cursor='grabbing';}});
canvas.addEventListener('mouseup',()=>{dragging=null;canvas.style.cursor='grab';});
canvas.addEventListener('mouseleave',()=>{dragging=null;hovered=null;tip.style.display='none';});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect(),idx=getN(e.clientX-r.left,e.clientY-r.top);
  if(idx<0)return;const n=nodes[idx],conns=links.filter(l=>l.source===idx||l.target===idx).sort((a,b)=>b.weight-a.weight);
  const p=document.getElementById('detail');
  if(n.type==='agent'){
    const tags=conns.map(l=>{const o=nodes[l.source===idx?l.target:l.source];return{label:o.label,color:o.color,w:l.weight};});
    p.innerHTML=`<div class="detail-card"><h3>${n.label}</h3><div class="meta">${n.cls} · ${n.attr} · ${n.fac} · v${n.ver} · 액션 ${n.acts.length}개</div><div class="tag-list">${tags.map(t=>`<span style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44">${t.label} ×${t.w}</span>`).join('')}</div><p style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:8px">전체 액션 목록</p><div class="act-grid">${n.acts.map(a=>`<div class="act-item"><span class="act-dot" style="background:${CAT_C[a.cat]||'#888'}"></span><div><span style="font-weight:500;font-size:11px">${a.n}</span><br><span style="font-size:10px;color:rgba(255,255,255,0.4)">${a.cat}${a.sub?' · '+a.sub:''}</span>${a.fx.length||a.cc.length?'<br><span style="font-size:10px;color:rgba(255,255,255,0.3)">'+[...a.fx,...a.cc].join(', ')+'</span>':''}</div></div>`).join('')}</div></div>`;
  } else {
    const ags=conns.map(l=>{const o=nodes[l.source===idx?l.target:l.source];return{label:o.label,cls:o.cls,attr:o.attr,color:o.color,w:l.weight};});
    p.innerHTML=`<div class="detail-card"><h3 style="color:${n.color}">${n.label}</h3><div class="meta">태그 노드 · 연결 에이전트 ${ags.length}명 · <span style="cursor:pointer;color:#85B7EB;text-decoration:underline" onclick="setTagFilter('${n.label}')">이 태그로 필터링</span></div><div class="conn-grid">${ags.map(a=>`<div class="conn-item"><span class="conn-dot" style="background:${ATTR_C[a.attr]||'#888'}"></span><div><span style="font-weight:500">${a.label}</span><span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:4px">${a.cls}</span></div><span style="margin-left:auto;font-size:11px;color:${n.color};font-weight:500">×${a.w}</span></div>`).join('')}</div></div>`;
  }
});

function setActive(container,btn){container.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function rebuildAll(){document.getElementById('detail').innerHTML='';build();}

const vc=document.getElementById('ver-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fVer='all';setActive(vc,b);rebuildAll();};vc.appendChild(b);}
VERSIONS.forEach(v=>{const b=document.createElement('button');b.textContent='v'+v;b.onclick=()=>{fVer=v;setActive(vc,b);rebuildAll();};vc.appendChild(b);});

const ac=document.getElementById('attr-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fAttr='all';setActive(ac,b);rebuildAll();};ac.appendChild(b);}
['불','얼음','전기','에테르','물리'].forEach(a=>{const b=document.createElement('button');b.textContent=a;b.style.borderColor=(ATTR_C[a]||'')+'88';b.onclick=()=>{fAttr=a;setActive(ac,b);rebuildAll();};ac.appendChild(b);});

const clc=document.getElementById('cls-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fCls='all';setActive(clc,b);rebuildAll();};clc.appendChild(b);}
['명파','강공','격파','지원','방어','이상'].forEach(c=>{const b=document.createElement('button');b.textContent=c;b.style.borderColor=(CLS_C[c]||'')+'88';b.onclick=()=>{fCls=c;setActive(clc,b);rebuildAll();};clc.appendChild(b);});

document.getElementById('legend').innerHTML=[
  ...Object.entries(CLS_C).map(([k,v])=>`<span><span class="dot" style="background:${v}"></span>${k}</span>`),
  `<span><span class="dia" style="background:transparent;border-color:rgba(255,255,255,0.4)"></span>태그</span>`
].join('');

const tc=document.getElementById('tag-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fTag='all';setActive(tc,b);rebuildAll();};tc.appendChild(b);}
const ALL_TAGS=['무적판정','경직저항증가','버프','디버프','게이지회복','카운터','이상축적','모으기','스턴','에어리얼','전기데미지','에테르데미지','물리데미지','불데미지','얼음데미지'];
ALL_TAGS.forEach(t=>{const b=document.createElement('button');b.textContent=t;b.style.borderColor=(TAG_C[t]||'#888')+'88';b.onclick=()=>{fTag=t;setActive(tc,b);rebuildAll();};tc.appendChild(b);});

function setTagFilter(tag){
  fTag=tag;
  tc.querySelectorAll('button').forEach(b=>{b.classList.remove('active');if(b.textContent===tag)b.classList.add('active');});
  rebuildAll();
}

window.addEventListener('resize',()=>{resize();build();});
build();
</script>
</body>
</html>
