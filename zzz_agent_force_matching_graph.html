.controls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}

.controls button:hover{border-color:rgba(255,255,255,0.3);color:#fff}

.legend{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0 14px;font-size:11px;color:rgba(255,255,255,0.45)}
.legend span{display:flex;align-items:center;gap:5px}
.legend .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend .dia{width:9px;height:9px;transform:rotate(45deg);border-radius:1px;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)}
canvas{width:100%;border-radius:12px;background:#151514;border:1px solid rgba(255,255,255,0.06)}
#tooltip{display:none;position:fixed;background:#1e1e1c;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;font-size:12px;pointer-events:none;z-index:99;max-width:300px;line-height:1.6;color:#e0dfda;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#detail{margin-top:20px}
.detail-card{background:#1a1a18;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;color:#e0dfda}
.detail-card h3{font-size:15px;font-weight:500;margin-bottom:8px}
.detail-card .meta{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag-list span{font-size:11px;padding:3px 10px;border-radius:12px}
.conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.conn-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.04);font-size:13px;color:#e0dfda}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px}
.stat-card .label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.stat-card .val{font-size:20px;font-weight:500;color:#e0dfda}

const CLS_C={명파:"#BA7517",강공:"#D85A30",격파:"#E24B4A",지원:"#378ADD",방어:"#1D9E75",이상:"#7F77DD"};
const CAT_C={기본공격:"#888780",회피:"#1D9E75",지원:"#378ADD",특수공격:"#D85A30",연쇄공격:"#D4537E",코어스킬:"#BA7517"};
const TAG_C={무적판정:"#E24B4A",경직저항증가:"#BA7517",카운터:"#378ADD",게이지회복:"#1D9E75",버프:"#639922",디버프:"#534AB7",이상축적:"#7F77DD",스턴:"#E24B4A",넉백:"#D85A30",에어리얼:"#378ADD",슬로우:"#888780",풀업:"#EF9F27",전기데미지:"#EF9F27",에테르데미지:"#7F77DD",물리데미지:"#888780",불데미지:"#D85A30",빙데미지:"#378ADD",얼음데미지:"#378ADD",고정데미지:"#D4537E"};
const ATTR_C={불:"#D85A30",얼음:"#378ADD",전기:"#EF9F27",에테르:"#7F77DD",물리:"#888780"};

let filter='all';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tip=document.getElementById('tooltip');
let W,H,dpr;
function resize(){const r=canvas.getBoundingClientRect();dpr=devicePixelRatio||1;W=r.width;H=Math.max(600,W*0.7);canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();

let nodes=[],links=[],sim=null,dragging=null,hovered=null;

function build(){
  const fa=filter==='all'?A:A.filter(a=>a.attr===filter||a.cls===filter);
  const edgeMap=new Map();
  fa.forEach(a=>a.acts.forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{
    const k=a.id+'|'+t;edgeMap.set(k,(edgeMap.get(k)||0)+1);
  })));
  const usedTags=new Set();edgeMap.forEach((v,k)=>usedTags.add(k.split('|')[1]));
  const tN=[...usedTags].map(t=>({type:'tag',label:t,color:TAG_C[t]||'#888',x:W/2+(Math.random()-.5)*W*.35,y:H/2+(Math.random()-.5)*H*.35,vx:0,vy:0,r:0}));
  const aN=fa.map(a=>({type:'agent',id:a.id,label:a.name,cls:a.cls,attr:a.attr,fac:a.fac,color:CLS_C[a.cls],x:W/2+(Math.random()-.5)*W*.7,y:H/2+(Math.random()-.5)*H*.7,vx:0,vy:0,r:13,acts:a.acts}));
  nodes=[...tN,...aN];
  links=[];
  edgeMap.forEach((w,k)=>{const[aid,tag]=k.split('|');const si=nodes.findIndex(n=>n.type==='tag'&&n.label===tag);const ti=nodes.findIndex(n=>n.type==='agent'&&n.id===+aid);if(si>=0&&ti>=0)links.push({source:si,target:ti,weight:w});});
  tN.forEach((t,i)=>{const idx=nodes.indexOf(t);const cnt=links.filter(l=>l.source===idx||l.target===idx);t.r=10+cnt.reduce((s,l)=>s+l.weight,0)*1.2;});
  const st=document.getElementById('stats');
  st.innerHTML=[{l:'에이전트',v:fa.length},{l:'태그 노드',v:usedTags.size},{l:'연결선',v:links.length},{l:'액션 총수',v:fa.reduce((s,a)=>s+a.acts.length,0)}].map(s=>`<div class="stat-card"><div class="label">${s.l}</div><div class="val">${s.v}</div></div>`).join('');
  if(sim)cancelAnimationFrame(sim);
  run();
}

function run(){
  for(let it=0;it<2;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy)||1;
      let rep=nodes[i].type==='tag'&&nodes[j].type==='tag'?1400:500;
      let f=rep/(d*d);nodes[i].vx-=dx/d*f;nodes[i].vy-=dy/d*f;nodes[j].vx+=dx/d*f;nodes[j].vy+=dy/d*f;
    }
    links.forEach(l=>{const a=nodes[l.source],b=nodes[l.target];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;let f=(d-110)*0.003*l.weight;a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;});
    nodes.forEach(n=>{n.vx+=(W/2-n.x)*0.0006;n.vy+=(H/2-n.y)*0.0006;n.vx*=0.8;n.vy*=0.8;if(n!==dragging){n.x+=n.vx;n.y+=n.vy;}n.x=Math.max(n.r+4,Math.min(W-n.r-4,n.x));n.y=Math.max(n.r+4,Math.min(H-n.r-4,n.y));});
  }
  draw();sim=requestAnimationFrame(run);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const hi=hovered;const cs=new Set();
  if(hi!==null)links.forEach(l=>{if(l.source===hi||l.target===hi){cs.add(l.source);cs.add(l.target);}});
  links.forEach(l=>{const a=nodes[l.source],b=nodes[l.target];const hl=hi!==null&&(l.source===hi||l.target===hi);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=hl?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.04)';ctx.lineWidth=hl?Math.min(l.weight*.6,3):0.4;ctx.stroke();});
  nodes.forEach((n,i)=>{
    const hl=hi===i;const dim=hi!==null&&!cs.has(i)&&hi!==i;ctx.globalAlpha=dim?0.12:hl?1:0.85;
    if(n.type==='tag'){
      const s=n.r;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(Math.PI/4);ctx.beginPath();ctx.rect(-s/2,-s/2,s,s);ctx.fillStyle=n.color+'33';ctx.fill();ctx.strokeStyle=n.color+'99';ctx.lineWidth=hl?2:1;ctx.stroke();ctx.restore();
      ctx.fillStyle='#fff';ctx.font='600 '+(n.r>18?'10':'9')+'px "Noto Sans KR",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.label,n.x,n.y);
    } else {
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+(hl?3:0),0,Math.PI*2);ctx.fillStyle=n.color+(hl?'':'bb');ctx.fill();
      if(hl){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
      ctx.beginPath();ctx.arc(n.x+n.r*.6,n.y-n.r*.6,3,0,Math.PI*2);ctx.fillStyle=ATTR_C[n.attr];ctx.fill();
      ctx.fillStyle='#fff';ctx.font='500 9px "Noto Sans KR",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      const nm=n.label.length>5?n.label.slice(0,5)+'…':n.label;ctx.fillText(nm,n.x,n.y);
    }
    ctx.globalAlpha=1;
  });
}

function getN(x,y){return nodes.findIndex(n=>Math.hypot(n.x-x,n.y-y)<=n.r+5);}
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(dragging){dragging.x=mx;dragging.y=my;tip.style.display='none';return;}
  const idx=getN(mx,my);hovered=idx>=0?idx:null;canvas.style.cursor=hovered!==null?'pointer':'grab';
  if(hovered!==null){
    const n=nodes[hovered],conns=links.filter(l=>l.source===hovered||l.target===hovered);
    if(n.type==='tag'){const ags=conns.map(l=>{const o=nodes[l.source===hovered?l.target:l.source];return o.label;});tip.innerHTML=`<div style="font-weight:500;color:${n.color}">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">연결 ${ags.length}명: ${ags.join(', ')}</div>`;}
    else{const tags=conns.map(l=>{const o=nodes[l.source===hovered?l.target:l.source];return o.label;});tip.innerHTML=`<div style="font-weight:500">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">${n.cls} · ${n.attr} · ${n.fac}</div><div style="font-size:11px;margin-top:2px">태그: ${tags.join(', ')}</div>`;}
    tip.style.display='block';tip.style.left=Math.min(e.clientX+14,innerWidth-320)+'px';tip.style.top=(e.clientY-12)+'px';
  } else tip.style.display='none';
});
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();const idx=getN(e.clientX-r.left,e.clientY-r.top);if(idx>=0){dragging=nodes[idx];canvas.style.cursor='grabbing';}});
canvas.addEventListener('mouseup',()=>{dragging=null;canvas.style.cursor='grab';});
canvas.addEventListener('mouseleave',()=>{dragging=null;hovered=null;tip.style.display='none';});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect(),idx=getN(e.clientX-r.left,e.clientY-r.top);
  if(idx<0)return;const n=nodes[idx],conns=links.filter(l=>l.source===idx||l.target===idx).sort((a,b)=>b.weight-a.weight);
  const p=document.getElementById('detail');
  if(n.type==='agent'){
    const tags=conns.map(l=>{const o=nodes[l.source===idx?l.target:l.source];return{label:o.label,color:o.color,w:l.weight};});
    p.innerHTML=`<div class="detail-card"><h3>${n.label}</h3><div class="meta">${n.cls} · ${n.attr} · ${n.fac} · 액션 ${n.acts.length}개</div><div class="tag-list">${tags.map(t=>`<span style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44">${t.label} ×${t.w}</span>`).join('')}</div><p style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:8px">액션 목록</p><div class="conn-grid">${n.acts.map(a=>`<div class="conn-item"><span class="conn-dot" style="background:${CAT_C[a.cat]}"></span><div><span style="font-weight:500">${a.n}</span><br><span style="font-size:11px;color:rgba(255,255,255,0.4)">${a.cat}${a.sub?' · '+a.sub:''}</span></div></div>`).join('')}</div></div>`;
  } else {
    const ags=conns.map(l=>{const o=nodes[l.source===idx?l.target:l.source];return{label:o.label,cls:o.cls,attr:o.attr,color:o.color,w:l.weight};});
    p.innerHTML=`<div class="detail-card"><h3 style="color:${n.color}">${n.label}</h3><div class="meta">태그 노드 · 연결 에이전트 ${ags.length}명</div><div class="conn-grid">${ags.map(a=>`<div class="conn-item"><span class="conn-dot" style="background:${ATTR_C[a.attr]}"></span><div><span style="font-weight:500">${a.label}</span><span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:4px">${a.cls}</span></div><span style="margin-left:auto;font-size:11px;color:${n.color};font-weight:500">×${a.w}</span></div>`).join('')}</div></div>`;
  }
});

// controls
const ac=document.getElementById('attr-ctrl');
['all','불','얼음','전기','에테르','물리'].forEach(f=>{const b=document.createElement('button');b.textContent=f==='all'?'전체':f;if(f==='all')b.classList.add('active');if(ATTR_C[f])b.style.borderColor=ATTR_C[f]+'88';b.onclick=()=>{filter=f;ac.querySelectorAll('button').forEach(x=>x.classList.remove('active'));cc.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('detail').innerHTML='';build();};ac.appendChild(b);});
const cc=document.getElementById('cls-ctrl');
['명파','강공','격파','지원','방어','이상'].forEach(c=>{const b=document.createElement('button');b.textContent=c;b.style.borderColor=CLS_C[c]+'88';b.onclick=()=>{filter=c;ac.querySelectorAll('button').forEach(x=>x.classList.remove('active'));cc.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('detail').innerHTML='';build();};cc.appendChild(b);});

document.getElementById('legend').innerHTML=[
  ...Object.entries(CLS_C).map(([k,v])=>`<span><span class="dot" style="background:${v}"></span>${k}</span>`),
  `<span><span class="dia" style="background:transparent;border-color:rgba(255,255,255,0.4)"></span>태그 노드</span>`
].join('');

window.addEventListener('resize',()=>{resize();build();});
build();
</script>
</body>
</html>
