<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZZ 키워드 맵 v6 — 속성 → 캐릭터 → 태그</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e0d;color:#e0dfda;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:500;margin-bottom:4px;letter-spacing:-0.5px}
.sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px}
.filter-group{margin-bottom:8px}
.filter-group .flabel{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:4px}
.controls{display:flex;flex-wrap:wrap;gap:5px}
.controls button{font-family:inherit;font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);color:#c8c7c1;background:transparent;transition:all 0.15s}
.controls button:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.controls button.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3);color:#fff;font-weight:500}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;font-size:11px;color:rgba(255,255,255,0.45)}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend .rr{width:14px;height:10px;border-radius:3px;flex-shrink:0}
.legend .dia{width:8px;height:8px;transform:rotate(45deg);border-radius:1px;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)}
.canvas-wrap{position:relative;margin-bottom:4px}
canvas{width:100%;border-radius:12px;background:#131312;border:1px solid rgba(255,255,255,0.06);display:block}
.zoom-bar{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(20,20,19,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 6px}
.zoom-bar button{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#e0dfda;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.zoom-bar button:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3)}
.zoom-bar input[type=range]{writing-mode:vertical-lr;direction:rtl;width:4px;height:100px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.12);border-radius:2px;outline:none;cursor:pointer}
.zoom-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e0dfda;border:none;cursor:pointer}
.zoom-bar input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#e0dfda;border:none;cursor:pointer}
.zoom-bar .zoom-val{font-size:10px;color:rgba(255,255,255,0.4)}
#tooltip{display:none;position:fixed;background:#1e1e1c;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;font-size:12px;pointer-events:none;z-index:99;max-width:320px;line-height:1.6;color:#e0dfda;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#detail{margin-top:20px}
.detail-card{background:#1a1a18;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;color:#e0dfda}
.detail-card h3{font-size:15px;font-weight:500;margin-bottom:8px}
.detail-card .meta{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag-list span{font-size:11px;padding:3px 10px;border-radius:12px}
.conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:5px}
.conn-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.04);font-size:13px;color:#e0dfda}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px}
.stat-card .label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.stat-card .val{font-size:20px;font-weight:500;color:#e0dfda}
.physics-panel{margin-bottom:12px}
.slider-row{display:flex;align-items:center;gap:8px;min-width:260px}
.slider-row label{font-size:11px;color:rgba(255,255,255,0.5);min-width:110px;display:flex;justify-content:space-between}
.slider-row label span{color:#e0dfda;font-weight:500;min-width:32px;text-align:right}
.slider-row input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.12);border-radius:2px;outline:none;cursor:pointer}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e0dfda;border:none;cursor:pointer}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#e0dfda;border:none;cursor:pointer}
</style>
</head>

</div>
<div id="tooltip"></div>
<div id="detail"></div>

const CLS_C={명파:"#BA7517",강공:"#D85A30",격파:"#E24B4A",지원:"#378ADD",방어:"#1D9E75",이상:"#7F77DD"};
const ATTR_C={불:"#D85A30",얼음:"#378ADD",전기:"#EF9F27",에테르:"#7F77DD",물리:"#888780"};
const TAG_C={무적판정:"#E24B4A",경직저항증가:"#BA7517",카운터:"#378ADD",게이지회복:"#1D9E75",버프:"#639922",디버프:"#534AB7",이상축적:"#7F77DD",모으기:"#BA7517",스턴:"#E24B4A",에어리얼:"#378ADD",전기데미지:"#EF9F27",에테르데미지:"#7F77DD",물리데미지:"#888780",불데미지:"#D85A30",얼음데미지:"#378ADD"};
const VERSIONS=["1.0", "1.1", "1.2", "1.3", "1.4", "1.5", "1.6", "1.7", "2.0", "2.1", "2.2", "2.3", "2.4", "2.5", "2.6"];

let fVer='all',fAttr='all',fCls='all',fTag='all',fSkill='all';
let scale=1, panX=0, panY=0, isPanning=false, panStartX=0, panStartY=0;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tip=document.getElementById('tooltip');
let W,H,dpr;
function resize(){const r=canvas.getBoundingClientRect();dpr=devicePixelRatio||1;W=r.width;H=Math.max(620,W*0.7);canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
resize();
let nodes=[],links=[],sim=null,dragging=null,hovered=null;

// Zoom
function zoomIn(){const s=document.getElementById('s-zoom');s.value=Math.min(300,+s.value+15);updateZoom();}
function zoomOut(){const s=document.getElementById('s-zoom');s.value=Math.max(30,+s.value-15);updateZoom();}
function updateZoom(){scale=document.getElementById('s-zoom').value/100;document.getElementById('v-zoom').textContent=Math.round(scale*100)+'%';}
document.getElementById('s-zoom').addEventListener('input',updateZoom);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=document.getElementById('s-zoom');
  s.value=Math.max(30,Math.min(300,+s.value+(e.deltaY<0?10:-10)));
  updateZoom();
},{passive:false});

// Screen ↔ world transforms
function s2w(sx,sy){return{x:(sx-W/2-panX)/scale+W/2,y:(sy-H/2-panY)/scale+H/2};}
function w2s(wx,wy){return{x:(wx-W/2)*scale+W/2+panX,y:(wy-H/2)*scale+H/2+panY};}

function filtered(){
  return A.filter(a=>{
    if(fVer!=='all'&&a.ver!==fVer) return false;
    if(fAttr!=='all'&&a.attr!==fAttr) return false;
    if(fCls!=='all'&&a.cls!==fCls) return false;
    if(fTag!=='all') if(!a.acts.some(ac=>[...ac.fx,...ac.cc,...ac.dmg].includes(fTag))) return false;
    if(fSkill!=='all') if(!a.acts.some(ac=>(ac.sub||ac.cat)===fSkill)) return false;
    return true;
  });
}

// Get filtered actions for an agent (respecting fSkill)
function filteredActs(a){
  if(fSkill==='all') return a.acts;
  return a.acts.filter(ac=>(ac.sub||ac.cat)===fSkill);
}

function build(){
  const fa=filtered();
  nodes=[];links=[];
  const usedAttr=new Set(fa.map(a=>a.attr));
  const tagAgents=new Map();
  fa.forEach(a=>filteredActs(a).forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{
    if(!tagAgents.has(t))tagAgents.set(t,new Set());
    tagAgents.get(t).add(a.id);
  })));

  // 1) Attr hub nodes
  const attrIdx={};
  [...usedAttr].forEach(at=>{
    const cnt=fa.filter(a=>a.attr===at).length;
    attrIdx[at]=nodes.length;
    nodes.push({type:'attr',label:at,color:ATTR_C[at]||'#888',
      x:W/2+(Math.random()-.5)*W*.3,y:H/2+(Math.random()-.5)*H*.3,
      vx:0,vy:0,r:16+cnt*1.1});
  });

  // 2) Agent nodes
  fa.forEach(a=>{
    const ai=nodes.length;
    nodes.push({type:'agent',id:a.id,label:a.name,cls:a.cls,attr:a.attr,fac:a.fac,ver:a.ver,
      color:ATTR_C[a.attr],acts:a.acts,
      x:nodes[attrIdx[a.attr]].x+(Math.random()-.5)*140,
      y:nodes[attrIdx[a.attr]].y+(Math.random()-.5)*140,
      vx:0,vy:0,r:13});
    links.push({source:ai,target:attrIdx[a.attr],weight:2,lt:'a-at'});
  });

  // 3) Tag nodes
  const tagIdx={};
  tagAgents.forEach((agSet,t)=>{
    tagIdx[t]=nodes.length;
    nodes.push({type:'tag',label:t,color:TAG_C[t]||'#888',
      x:W/2+(Math.random()-.5)*W*.6,y:H/2+(Math.random()-.5)*H*.6,
      vx:0,vy:0,r:Math.min(36,8+agSet.size*0.7),agentCount:agSet.size});
  });

  // 4) Agent → Tag links
  fa.forEach(a=>{
    const ai=nodes.findIndex(n=>n.type==='agent'&&n.id===a.id);
    const myTags=new Map();
    filteredActs(a).forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{myTags.set(t,(myTags.get(t)||0)+1);}));
    myTags.forEach((w,t)=>{
      if(tagIdx[t]!==undefined) links.push({source:ai,target:tagIdx[t],weight:w,lt:'a-t'});
    });
  });

  document.getElementById('stats').innerHTML=[
    {l:'에이전트',v:fa.length},{l:'속성',v:usedAttr.size},{l:'태그',v:tagAgents.size},{l:'연결선',v:links.length}
  ].map(s=>`<div class="stat-card"><div class="label">${s.l}</div><div class="val">${s.v}</div></div>`).join('');
  if(sim)cancelAnimationFrame(sim);
  run();
}

function run(){
  const pC=document.getElementById('s-center').value/100000;
  const pL=document.getElementById('s-link').value/50000;
  const pR=document.getElementById('s-repel').value/100;
  document.getElementById('v-center').textContent=(pC*1000).toFixed(2);
  document.getElementById('v-link').textContent=(pL*1000).toFixed(2);
  document.getElementById('v-repel').textContent=Math.round(pR*100);

  for(let it=0;it<2;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const bothHub=a.type!=='agent'&&b.type!=='agent';
      const bothAgent=a.type==='agent'&&b.type==='agent';
      let rep=(bothHub?2500:bothAgent?300:500)*pR;
      let f=rep/(d*d);
      a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f;
    }
    links.forEach(l=>{
      const a=nodes[l.source],b=nodes[l.target];
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const ideal=l.lt==='a-at'?80:100;
      const str=l.lt==='a-at'?pL*2.5:pL*Math.min(l.weight,6)*0.35;
      let f=(d-ideal)*str;
      a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;
    });
    nodes.forEach(n=>{
      n.vx+=(W/2-n.x)*pC;n.vy+=(H/2-n.y)*pC;
      n.vx*=0.78;n.vy*=0.78;
      if(n!==dragging){n.x+=n.vx;n.y+=n.vy;}
      n.x=Math.max(n.r+4,Math.min(W-n.r-4,n.x));
      n.y=Math.max(n.r+4,Math.min(H-n.r-4,n.y));
    });
  }
  draw();sim=requestAnimationFrame(run);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2+panX,H/2+panY);
  ctx.scale(scale,scale);
  ctx.translate(-W/2,-H/2);

  const hi=hovered;
  const hlN=new Set(),hlL=new Set();
  if(hi!==null){
    hlN.add(hi);
    links.forEach((l,li)=>{if(l.source===hi||l.target===hi){hlL.add(li);hlN.add(l.source);hlN.add(l.target);}});
    const first=new Set(hlN);
    links.forEach((l,li)=>{if(first.has(l.source)||first.has(l.target)){hlL.add(li);hlN.add(l.source);hlN.add(l.target);}});
  }

  // Links
  links.forEach((l,li)=>{
    const a=nodes[l.source],b=nodes[l.target];
    const hl=hi!==null&&hlL.has(li);
    const dim=hi!==null&&!hlL.has(li);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    if(dim){ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=0.3/scale;}
    else if(hl){
      ctx.strokeStyle=l.lt==='a-at'?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.35)';
      ctx.lineWidth=(l.lt==='a-at'?1.5:Math.min(l.weight*0.4,3))/scale;
    } else {
      ctx.strokeStyle=l.lt==='a-at'?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.08)';
      ctx.lineWidth=(l.lt==='a-at'?0.6:Math.min(l.weight*0.25,2))/scale;
    }
    ctx.stroke();
  });

  // Nodes
  nodes.forEach((n,i)=>{
    const hl=hi!==null&&hlN.has(i);
    const dim=hi!==null&&!hlN.has(i);
    ctx.globalAlpha=dim?0.06:1;

    if(n.type==='tag'){
      const s=n.r;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(Math.PI/4);
      ctx.beginPath();ctx.rect(-s/2,-s/2,s,s);
      ctx.fillStyle=n.color+'30';ctx.fill();
      ctx.strokeStyle=n.color+(hl?'cc':'55');ctx.lineWidth=(hl?2:1)/scale;ctx.stroke();ctx.restore();
      ctx.fillStyle='#fff';ctx.font=`600 ${Math.max(7,Math.min(11,n.r*0.45))}px "Noto Sans KR",sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.label,n.x,n.y);
    } else if(n.type==='attr'){
      const w=n.r*2.2,h=n.r*1.4,rx=6;
      ctx.beginPath();
      ctx.moveTo(n.x-w/2+rx,n.y-h/2);ctx.lineTo(n.x+w/2-rx,n.y-h/2);
      ctx.quadraticCurveTo(n.x+w/2,n.y-h/2,n.x+w/2,n.y-h/2+rx);
      ctx.lineTo(n.x+w/2,n.y+h/2-rx);ctx.quadraticCurveTo(n.x+w/2,n.y+h/2,n.x+w/2-rx,n.y+h/2);
      ctx.lineTo(n.x-w/2+rx,n.y+h/2);ctx.quadraticCurveTo(n.x-w/2,n.y+h/2,n.x-w/2,n.y+h/2-rx);
      ctx.lineTo(n.x-w/2,n.y-h/2+rx);ctx.quadraticCurveTo(n.x-w/2,n.y-h/2,n.x-w/2+rx,n.y-h/2);
      ctx.closePath();
      ctx.fillStyle=n.color+(hl?'55':'33');ctx.fill();
      ctx.strokeStyle=n.color+(hl?'cc':'66');ctx.lineWidth=(hl?2.5:1.5)/scale;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='600 12px "Noto Sans KR",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.label,n.x,n.y);
    } else {
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+(hl?2:0),0,Math.PI*2);
      ctx.fillStyle=n.color+(hl?'':'bb');ctx.fill();
      if(hl){ctx.strokeStyle='#fff';ctx.lineWidth=2/scale;ctx.stroke();}
      // cls badge
      ctx.fillStyle=CLS_C[n.cls]||'#888';
      ctx.beginPath();ctx.arc(n.x+n.r*.55,n.y-n.r*.55,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='500 8px "Noto Sans KR",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      const nm=n.label.length>4?n.label.slice(0,4)+'…':n.label;
      ctx.fillText(nm,n.x,n.y);
    }
    ctx.globalAlpha=1;
  });
  ctx.restore();
}

function getN(sx,sy){
  const w=s2w(sx,sy);
  let best=-1,bestD=Infinity;
  nodes.forEach((n,i)=>{
    const d=Math.hypot(n.x-w.x,n.y-w.y);
    let hitR=n.type==='attr'?Math.max(n.r*1.1,20):n.r+5;
    if(d<=hitR){
      const pri=n.type==='attr'?0:n.type==='agent'?1:2;
      const bpri=best>=0?(nodes[best].type==='attr'?0:nodes[best].type==='agent'?1:2):99;
      if(pri<bpri||(pri===bpri&&d<bestD)){best=i;bestD=d;}
    }
  });
  return best;
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(isPanning){panX+=e.movementX;panY+=e.movementY;return;}
  if(dragging){const w=s2w(mx,my);dragging.x=w.x;dragging.y=w.y;tip.style.display='none';return;}
  const idx=getN(mx,my);hovered=idx>=0?idx:null;
  canvas.style.cursor=hovered!==null?'pointer':'grab';
  if(hovered!==null){
    const n=nodes[hovered];
    if(n.type==='tag'){
      tip.innerHTML=`<div style="font-weight:500;color:${n.color}">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">에이전트 ${n.agentCount}명</div>`;
    } else if(n.type==='attr'){
      const cnt=nodes.filter(nd=>nd.type==='agent'&&nd.attr===n.label).length;
      tip.innerHTML=`<div style="font-weight:500;color:${n.color}">속성: ${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">에이전트 ${cnt}명</div>`;
    } else {
      const myTags=new Map();
      n.acts.forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{myTags.set(t,(myTags.get(t)||0)+1);}));
      const ts=[...myTags.entries()].map(([t,c])=>`${t}(${c})`).join(', ');
      tip.innerHTML=`<div style="font-weight:500">${n.label}</div><div style="font-size:11px;color:rgba(255,255,255,0.5)">${n.cls} · ${n.attr} · ${n.fac} · v${n.ver}</div><div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px">스킬 ${n.acts.length}개 · ${ts}</div>`;
    }
    tip.style.display='block';
    tip.style.left=Math.min(e.clientX+14,innerWidth-340)+'px';
    tip.style.top=(e.clientY-12)+'px';
  } else tip.style.display='none';
});

canvas.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const idx=getN(mx,my);
  if(idx>=0){dragging=nodes[idx];canvas.style.cursor='grabbing';}
  else{isPanning=true;canvas.style.cursor='grabbing';}
});
canvas.addEventListener('mouseup',()=>{dragging=null;isPanning=false;canvas.style.cursor='grab';});
canvas.addEventListener('mouseleave',()=>{dragging=null;isPanning=false;hovered=null;tip.style.display='none';});

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect(),idx=getN(e.clientX-r.left,e.clientY-r.top);
  if(idx<0)return;
  const n=nodes[idx],p=document.getElementById('detail');
  if(n.type==='agent'){
    const myTags=new Map();
    n.acts.forEach(ac=>[...ac.fx,...ac.cc,...ac.dmg].forEach(t=>{myTags.set(t,(myTags.get(t)||0)+1);}));
    const tags=[...myTags.entries()].sort((a,b)=>b[1]-a[1]);
    p.innerHTML=`<div class="detail-card"><h3>${n.label}</h3><div class="meta">${n.cls} · ${n.attr} · ${n.fac} · v${n.ver} · 스킬 ${n.acts.length}개</div><div class="tag-list">${tags.map(([t,c])=>`<span style="background:${(TAG_C[t]||'#888')}22;color:${TAG_C[t]||'#888'};border:1px solid ${(TAG_C[t]||'#888')}44">${t} ×${c}</span>`).join('')}</div></div>`;
  } else if(n.type==='attr'){
    const ag=nodes.filter(nd=>nd.type==='agent'&&nd.attr===n.label);
    p.innerHTML=`<div class="detail-card"><h3 style="color:${n.color}">속성: ${n.label}</h3><div class="meta">에이전트 ${ag.length}명</div><div class="conn-grid">${ag.map(a=>`<div class="conn-item"><span class="conn-dot" style="background:${ATTR_C[a.attr]||'#888'}"></span><span style="font-weight:500">${a.label}</span><span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:4px">${a.cls} · v${a.ver}</span></div>`).join('')}</div></div>`;
  } else {
    const fa2=filtered();
    const ag=fa2.filter(a=>a.acts.some(ac=>[...ac.fx,...ac.cc,...ac.dmg].includes(n.label)));
    p.innerHTML=`<div class="detail-card"><h3 style="color:${n.color}">${n.label}</h3><div class="meta">태그 · 에이전트 ${ag.length}명 · <span style="cursor:pointer;color:#85B7EB;text-decoration:underline" onclick="setTagFilter('${n.label}')">이 태그로 필터링</span></div><div class="conn-grid">${ag.map(a=>`<div class="conn-item"><span class="conn-dot" style="background:${ATTR_C[a.attr]||'#888'}"></span><span style="font-weight:500">${a.name}</span><span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:4px">${a.cls}</span></div>`).join('')}</div></div>`;
  }
});

function setActive(c,b){c.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');}
function rebuildAll(){document.getElementById('detail').innerHTML='';panX=0;panY=0;build();}

const vc=document.getElementById('ver-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fVer='all';setActive(vc,b);rebuildAll();};vc.appendChild(b);}
VERSIONS.forEach(v=>{const b=document.createElement('button');b.textContent='v'+v;b.onclick=()=>{fVer=v;setActive(vc,b);rebuildAll();};vc.appendChild(b);});

const ac=document.getElementById('attr-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fAttr='all';setActive(ac,b);rebuildAll();};ac.appendChild(b);}
['불','얼음','전기','에테르','물리'].forEach(a=>{const b=document.createElement('button');b.textContent=a;b.style.borderColor=(ATTR_C[a]||'')+'88';b.onclick=()=>{fAttr=a;setActive(ac,b);rebuildAll();};ac.appendChild(b);});

const clc=document.getElementById('cls-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fCls='all';setActive(clc,b);rebuildAll();};clc.appendChild(b);}
['명파','강공','격파','지원','방어','이상'].forEach(c=>{const b=document.createElement('button');b.textContent=c;b.style.borderColor=(CLS_C[c]||'')+'88';b.onclick=()=>{fCls=c;setActive(clc,b);rebuildAll();};clc.appendChild(b);});

const tc=document.getElementById('tag-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fTag='all';setActive(tc,b);rebuildAll();};tc.appendChild(b);}
['무적판정','경직저항증가','버프','디버프','게이지회복','카운터','이상축적','모으기','스턴','에어리얼','전기데미지','에테르데미지','물리데미지','불데미지','얼음데미지'].forEach(t=>{
  const b=document.createElement('button');b.textContent=t;b.style.borderColor=(TAG_C[t]||'#888')+'88';
  b.onclick=()=>{fTag=t;setActive(tc,b);rebuildAll();};tc.appendChild(b);
});
function setTagFilter(tag){fTag=tag;tc.querySelectorAll('button').forEach(b=>{b.classList.remove('active');if(b.textContent===tag)b.classList.add('active');});rebuildAll();}

const sc=document.getElementById('skill-ctrl');
{const b=document.createElement('button');b.textContent='전체';b.classList.add('active');b.onclick=()=>{fSkill='all';setActive(sc,b);rebuildAll();};sc.appendChild(b);}
const SKILL_CATS=['기본공격','탭-콤보','홀드','회피','대시공격','회피반격','회피지원','지원','빠른지원','패링지원','지원돌격','특수공격','EX특수공격','연쇄공격','궁극기','코어스킬','코어패시브','추가능력'];
SKILL_CATS.forEach(s=>{
  const b=document.createElement('button');b.textContent=s;
  b.onclick=()=>{fSkill=s;setActive(sc,b);rebuildAll();};sc.appendChild(b);
});

document.getElementById('legend').innerHTML=[
  `<span style="color:rgba(255,255,255,0.55)">에이전트(속성 색상):</span>`,
  ...Object.entries(ATTR_C).map(([k,v])=>`<span><span class="dot" style="background:${v}"></span>${k}</span>`),
  `<span style="margin-left:8px;color:rgba(255,255,255,0.55)">클래스 뱃지:</span>`,
  ...Object.entries(CLS_C).map(([k,v])=>`<span><span class="dot" style="background:${v};width:6px;height:6px"></span>${k}</span>`),
  `<span style="margin-left:8px"><span class="rr" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3)"></span>속성 허브</span>`,
  `<span><span class="dia" style="background:transparent;border-color:rgba(255,255,255,0.4)"></span>태그</span>`
].join('');

window.addEventListener('resize',()=>{resize();build();});
build();
</script>
</body>
</html>
